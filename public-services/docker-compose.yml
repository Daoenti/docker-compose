x-common-variables: &common-variables
  PUID: 568
  PGID: 568
  TZ: Etc/UTC

services:
  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    networks:
      - public-services
      - backend
    environment: *common-variables
    ports:
      - 5000:5000
    volumes:
      - /mnt/swim/media:/data
      - /mnt/swim/configs/kavita:/kavita/config
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  vault:
    image: vaultwarden/server:latest
    container_name: vault
    networks:
      - public-services
      - backend
    ports:
      - 8085:80
    environment:
      <<: *common-variables
      SIGNUPS_ALLOWED: false
      ADMIN_TOKEN: ${VAULT_TOKEN}
    volumes:
      - /mnt/swim/configs/vault:/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy-with-cloudflare:latest
    container_name: caddy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    networks:
      - public-services
      - backend
    ports:
      - "8443:443"
      - "8443:443/udp"  # HTTP/3
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - /mnt/swim/configs/caddy/data:/data
      - /mnt/swim/configs/caddy/config:/etc/caddy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://192.168.1.160:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  public-services:
    name: public-services
  backend:
    name: backend
    external: true
