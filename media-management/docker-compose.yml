x-common-variables: &common-variables
  PUID: 568
  PGID: 568
  TZ: Etc/UTC
  TP_THEME: overseerr

services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    networks:
      - media-management
      - backend
    environment:
      <<: *common-variables
      UMASK_SET: 022
      DOCKER_MODS: ghcr.io/gilbn/theme.park:radarr
    volumes:
      - /mnt/swim/media:/data
      - /mnt/swim/configs/radarr:/config
    ports:
      - 7878:7878/tcp
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sonarr:
    image: lscr.io/linuxserver/sonarr:develop
    container_name: sonarr
    networks:
      - media-management
      - backend
    environment:
      <<: *common-variables
      DOCKER_MODS: ghcr.io/gilbn/theme.park:sonarr
    volumes:
      - /mnt/swim/configs/sonarr:/config
      - /mnt/swim/media:/data
    ports:
      - 8989:8989
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    networks:
      - media-management
      - backend
    environment:
      <<: *common-variables
      DOCKER_MODS: ghcr.io/gilbn/theme.park:prowlarr
    ports:
      - 9696:9696
    volumes:
      - /mnt/swim/configs/prowlarr:/config
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  whisparr:
    image: ghcr.io/hotio/whisparr
    container_name: whisparr
    networks:
      - media-management
      - backend
    ports:
      - 6969:6969
    environment:
      <<: *common-variables
      UMASK: 002
      TP_HOTIO: true
    volumes:
      - /mnt/swim/configs/whisparr:/config
      - /mnt/swim/media:/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    networks:
      - media-management
      - backend
    ports:
      - 5055:5055
    environment:
      <<: *common-variables
    volumes:
      - /mnt/swim/configs/seerr:/app/config
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://192.168.1.160:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    networks:
      - media-management
      - backend
    ports:
      - 8181:8181
    environment:
      <<: *common-variables
      DOCKER_MODS: ghcr.io/gilbn/theme.park:tautulli
    volumes:
      - /mnt/swim/configs/tautulli:/config
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mylar3:
    image: lscr.io/linuxserver/mylar3:nightly
    container_name: mylar3
    environment:
      <<: *common-variables
    volumes:
      - /mnt/swim/configs/mylar3:/config
      - /mnt/swim/media/comics:/comics
      - /mnt/swim/media/downloads/comics:/downloads
    ports:
      - 8090:8090
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      <<: *common-variables
    volumes:
      - /mnt/swim/configs/sabnzbd:/config
      - /mnt/swim/media:/data
    ports:
      - 8080:8080
    networks:
      - media-management
      - backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api?mode=version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      <<: *common-variables
      PLEX_GID: 568
      PLEX_UID: 568
      TZ: etc/UTC
      VERSION: docker
    network_mode: host
    tmpfs:
      # Transcoding temp directory - stored in RAM for better performance
      # 8GB is sufficient for ~2 simultaneous 1080p transcodes
      # Increase to 16-32GB if you frequently transcode 4K content
      # Monitor usage: docker exec plex df -h /transcode
      - /transcode:size=8G,uid=970,gid=973,mode=777
    volumes:
      - /mnt/swim/configs/plex:/config
      - /mnt/swim/media:/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:32400/identity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

networks:
  media-management:
    name: media-management
  backend:
    name: backend
